<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F2EC" />

    <!-- PWA: installable as a home-screen app -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="wheretopark" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- SEO_HEAD_START — the SSR routes (api/home, api/carpark, api/parking-near)
         replace everything up to SEO_HEAD_END with per-page title/description/
         canonical/OG + JSON-LD. Served verbatim (home defaults) when un-injected. -->
    <!--SEO_HEAD_START-->
    <title>wheretopark.sg — Find parking before you leave</title>
    <meta
      name="description"
      content="Compare Singapore carpark rates and availability before you drive. Live HDB, URA and LTA prices, cheapest options near you, and which carparks have lots."
    />
    <link rel="canonical" href="https://wheretopark.sg/" />

    <!-- Open Graph / social previews -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="wheretopark.sg" />
    <meta property="og:title" content="wheretopark.sg — Find parking before you leave" />
    <meta
      property="og:description"
      content="Compare Singapore carpark rates and availability before you drive. Live HDB, URA and LTA prices and the cheapest options near you."
    />
    <meta property="og:url" content="https://wheretopark.sg/" />
    <meta property="og:image" content="https://wheretopark.sg/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="wheretopark.sg — Find parking before you leave" />
    <meta
      name="twitter:description"
      content="Compare Singapore carpark rates and availability before you drive."
    />
    <meta name="twitter:image" content="https://wheretopark.sg/og.png" />
    <!--SEO_HEAD_END-->
  </head>
  <body>
    <div id="root"><!--SEO_BODY--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
